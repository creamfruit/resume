<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>Messages - Re:Connect SG</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


  <link rel="stylesheet" href="/static/css/styles.css">
  <link rel="stylesheet" href="/static/css/messages.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/fab.css">
</head>

<body>
<div class="accessibility-bar">
    <div class="container-fluid d-flex align-items-center px-3">
      <button id="back-btn" class="back-btn">&larr; Back</button>
    </div>
  </div>

  <nav class="navbar">
    <div class="container d-flex align-items-center">
      <a href="{{ "/dashboard" if session.get("user_id") else "/" }}" class="logo">
        <div class="logo-circle"></div>
        <span class="logo-text">Re:Connect <span class="logo-sg">SG</span></span>
      </a>

      <ul class="nav-links icon-nav">
        <li class="icon-nav-item">
          <a href="/dashboard" class="icon-nav-link" title="Notifications" aria-label="Notifications">&#x1F514;</a>
        </li>
        <li class="icon-nav-item">
          <a href="/discover" class="icon-nav-link" title="Discover Matches" aria-label="Discover Matches">&#x2764;</a>
        </li>
        <li class="icon-nav-item">
          <a href="/explore" class="icon-nav-link" title="Search" aria-label="Search">&#x1F50D;</a>
        </li>
        <li class="icon-nav-item">
          <a href="/messages" class="icon-nav-link active" title="Messages" aria-label="Messages">&#x1F4AC;</a>
        </li>
        <li class="icon-nav-item">
          <a href="/profile" class="icon-nav-link" title="Profile" aria-label="Profile">&#x1F464;</a>
        </li>
      </ul>
    </div>
  </nav>

  <main class="messages-layout">
    <div class="container-fluid">
      <div class="messages-grid">

        <aside class="conversations-sidebar">
          <div class="sidebar-header">
            <h2>Re:Chat Messages</h2>
          </div>

          <div class="search-box">
            <input type="text" placeholder="Search conversations..." id="search-conversations" class="form-control" data-i18n-placeholder="search_conversations">
          </div>

          <div class="conversations-list" id="conversations-list"></div>
        </aside>

        <section class="chat-window">
          <div class="chat-header">
            <div class="chat-header-info">
              <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=ReConnect" class="chat-avatar" id="chat-avatar" alt="Avatar">
              <div>
                <h3 id="chat-name">Select a chat <span class="online-status">&#x2022; Online</span></h3>
              </div>
            </div>
            <div class="plant-buddy" id="plant-buddy" aria-live="polite">
              <div class="plant-icon stage-1" id="plant-icon">
                <div class="plant-pot"></div>
                <div class="plant-stem"></div>
                <div class="plant-leaf plant-leaf-left"></div>
                <div class="plant-leaf plant-leaf-right"></div>
                <div class="plant-bloom"></div>
              </div>
              <div class="plant-meta">
                <div class="plant-title">Buddy Plant</div>
                <div class="plant-streak" id="plant-streak">🔥 Streak: 0 days</div>
                <div class="plant-progress"><span id="plant-progress-fill" style="width:0%"></span></div>
              </div>
            </div>
          </div>

          <div class="message-warning">
            <span class="warning-icon">&#x26A0;</span>
            Language filter active
          </div>

          <div class="chat-messages" id="chat-messages"></div>

          <div class="chat-input-container">
            <div class="message-input-wrapper">
              <button class="starter-btn" id="starter-btn" type="button" aria-label="Conversation starters" title="Conversation starters">&#x1F4A1;</button>
              <input type="text" class="message-input form-control" id="message-input" placeholder="Type your message...">
              <button class="composer-meetup-btn" id="set-meetup-btn" type="button">Set Meetup</button>
              <button class="send-btn" id="send-btn" data-i18n="send_message">Send</button>
            </div>
            <div class="starter-popup" id="starter-popup" aria-hidden="true">
              <div class="starter-popup-title">Conversation Starters</div>
              <button class="starter-option" type="button">How has your day been so far?</button>
              <button class="starter-option" type="button">What hobbies are you into recently?</button>
              <button class="starter-option" type="button">Would you like to meet at a quiet cafe this week?</button>
              <button class="starter-option" type="button">Any shows, books, or music you'd recommend?</button>
              <button class="starter-option" type="button">What's something fun you're looking forward to?</button>
            </div>

            <div class="safety-notice">
              <span>&#x1F512; All messages are monitored for safety. Report inappropriate content.</span>
            </div>
          </div>
        </section>

      </div>
    </div>
  </main>

  <div class="modal" id="lang-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Select Language</h3>
        <button class="close-modal" id="close-lang-modal">&times;</button>
      </div>
      <div class="lang-options">
        <button class="lang-option-big" data-lang="en">
          <span class="flag">🇬🇧</span> English
        </button>
        <button class="lang-option-big" data-lang="zh">
          <span class="flag">🇨🇳</span> 中文
        </button>
        <button class="lang-option-big" data-lang="ms">
          <span class="flag">🇲🇾</span> Bahasa Melayu
        </button>
        <button class="lang-option-big" data-lang="ta">
          <span class="flag">🇸🇬</span> தமிழ்
        </button>
      </div>
    </div>
  </div>

  <div class="ui-modal" id="ui-modal">
    <div class="ui-modal-card">
      <div class="ui-modal-header">
        <h3 id="ui-modal-title">Title</h3>
        <button class="ui-modal-close" id="ui-modal-close">&#x2716;</button>
      </div>
      <div class="ui-modal-body" id="ui-modal-body"></div>
      <div class="ui-modal-actions" id="ui-modal-actions"></div>
    </div>
  </div>

  <script src="/static/js/messages.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% include "partials/fab.html" %}
  <script src="/static/js/fab.js"></script>
</body>
</html>
