            </button>

        </header>

    <div id="sidebar-wrapper">
        <div class="sidebar-header">
            <button id="close-sidebar" class="close-icon" aria-label="Close sidebar">
                <span class="material-symbols-outlined">close</span>
            </button>
            <span class="sidebar-title">Menu</span>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li>
                    <a href="index.html">
                        <span class="material-symbols-outlined">home</span>
                        <span class="nav-text">Home</span>

    <div class="content-area">
        <br>
    </div>
    <div>
        <form id="apply-form" class="apply-form">
            <div class="form-group">
                <label for="name" style="display: flex; align-items: center; gap: 4px;" >
                    Full Name
                    <span class="required" style="margin: 0;">*</span>
                </label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name.">
            </div>
            <div class="form-group">
                <label for="adminNumber" style="display: flex; align-items: center; gap: 4px;">
                    Admin Number
                    <span class="required" style="margin: 0;" required>*</span>
                </label>
                <input type="text" id="adminNumber" name="adminNumber" required placeholder="e.g. 241234A" pattern="\d{6}[A-Za-z]" title="Admin number is in the following format. (251234A)" required>
            </div>
            <div class="form-group">
                <label for="reason" style="display: flex; align-items: center; gap: 4px;">
                    Why do you want to join?
                    <span class="required" style="margin: 0;">*</span>
                </label>
                <textarea id="reason" name="reason" rows="4" required placeholder="Tell us why you want to join the Service Learning Club"></textarea>
            </div>
            <div class="form-footer">
                <label for="check" style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="check" name="check" required>
                    By checking this checkbox, you agree to our<a href="www.termsandconditions.com">terms and conditions</a>.
                    <span class="required" style="margin: 0;">*</span>
                </label>
            </div>
            <button type="submit" class="newbutton">Apply Now</button>
        </form>
        <br>
        <br>
    </div>

        <br>

                </a>
                <a href="https://www.facebook.com" target="_blank" aria-label="Facebook" class="contact-item">

                </a>
                <a href="https://www.twitter.com" target="_blank" aria-label="X (Twitter)" class="contact-item">
                    <i class="fab fa-x-twitter"></i>
                </a>
                <a href="https://www.youtube.com" target="_blank" aria-label="YouTube" class="contact-item">
                    <i class="fab fa-youtube"></i>
                </a>
                <a href="https://www.linkedin.com" target="_blank" aria-label="LinkedIn" class="contact-item">
                    <i class="fab fa-linkedin-in"></i>
                </a>
            </nav>
        <br>    
        <h3 class="h3" style="color:white">Or you can email us at:</h3>
        <a href="mailto:slcnyp@nyp.edu.sg" class="email">slcnyp@nyp.edu.sg</p>
